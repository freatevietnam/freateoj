<script type="text/javascript" src="{{ static('mathjax_config.js') }}"></script>
<script type="text/javascript" src="{{ static('freateoj/mathjax/3.2.0/es5/tex-chtml.min.js') }}"></script>
<script type="text/javascript">
    if (typeof MathJax !== 'undefined' && MathJax.startup && MathJax.startup.promise) {
        MathJax.startup.promise.then(function () {
            return MathJax.typesetPromise();
        }).then(function () {
            $('.tex-image').hide();
            $('.tex-text').show();
        });
    } else if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
        MathJax.typesetPromise().then(function () {
            $('.tex-image').hide();
            $('.tex-text').show();
        });
    }
</script>
